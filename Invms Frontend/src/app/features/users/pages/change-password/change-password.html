<div class="min-h-screen bg-slate-50 p-6 lg:p-10">
  <div class="mx-auto max-w-lg">
    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Security Settings</h1>
        <p class="mt-1 text-slate-500">Update your password to keep your account secure.</p>
      </div>
      <button routerLink="/dashboard" class="flex items-center gap-2 text-sm font-medium text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        Dashboard
      </button>
    </div>

    <!-- Form Card -->
    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-xl shadow-slate-200/50">
      <form [formGroup]="changePassForm" (ngSubmit)="onSubmit()" class="p-8 lg:p-10">
        <div class="space-y-6">
          
          <!-- Current Password -->
          <div>
            <label for="currentPassword" class="block text-sm font-bold text-slate-700">Current Password</label>
            <div class="mt-2">
              <input formControlName="currentPassword" id="currentPassword" type="password" placeholder="••••••••"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
          </div>

          <!-- Divider -->
          <div class="relative py-2">
            <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center"><span class="bg-white px-3 text-[10px] font-black uppercase tracking-widest text-slate-400">New Password</span></div>
          </div>

          <!-- New Password -->
          <div>
            <label for="newPassword" class="block text-sm font-bold text-slate-700">New Password</label>
            <div class="mt-2 text-xs text-slate-500 mb-2">Must be at least 6 characters long.</div>
            <div class="mt-1">
              <input formControlName="newPassword" id="newPassword" type="password" placeholder="••••••••"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-bold text-slate-700">Confirm New Password</label>
            <div class="mt-2">
              <input formControlName="confirmPassword" id="confirmPassword" type="password" placeholder="••••••••"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
            <p *ngIf="changePassForm.hasError('mismatch') && changePassForm.get('confirmPassword')?.touched" class="mt-2 text-xs font-medium text-red-500">Passwords do not match.</p>
          </div>

        </div>

        <!-- Action -->
        <div class="mt-10 pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
          <button type="button" routerLink="/dashboard" class="px-6 py-3 text-sm font-bold text-slate-600 hover:text-slate-900 transition-colors">
            Cancel
          </button>
          <button type="submit" [disabled]="isLoading || changePassForm.invalid"
            class="group relative flex items-center justify-center gap-3 overflow-hidden rounded-xl bg-blue-600 px-8 py-3 text-sm font-black text-white transition-all hover:bg-blue-700 active:scale-95 disabled:opacity-70 disabled:active:scale-100 shadow-lg shadow-blue-500/30">
            <span *ngIf="!isLoading">Update Password</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="h-4 w-4 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Saving Changes...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
