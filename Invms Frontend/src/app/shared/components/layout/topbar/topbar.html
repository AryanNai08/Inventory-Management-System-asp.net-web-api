<header class="flex h-16 items-center justify-between border-b border-gray-200 bg-white px-4 md:px-6 shadow-sm z-10 w-full">
  <!-- Search -->
  <div class="flex items-center flex-1">
    <div class="relative hidden sm:block w-full max-w-sm">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </div>
      <input type="text" class="block w-full rounded-full border border-slate-200 bg-slate-50 py-2 pl-10 pr-3 text-sm placeholder-slate-500 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Search inventory...">
    </div>
  </div>

  <!-- Right side items -->
  <div class="flex items-center gap-4">
    <button class="relative rounded-full p-2 text-slate-500 hover:bg-slate-100 transition-colors">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
      <span class="absolute right-1.5 top-1.5 flex h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white"></span>
    </button>
    
    <div class="flex items-center gap-2 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100 hover:bg-slate-100 transition-colors relative group">
      <div class="h-8 w-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">
        {{ username.charAt(0).toUpperCase() }}
      </div>
      <span class="hidden sm:block text-sm font-medium text-slate-700">{{ username }}</span>
      
      <!-- Role Tooltip -->
      <div class="absolute top-[120%] right-0 invisible group-hover:visible bg-slate-800 text-white text-[10px] py-1 px-2 rounded shadow-lg whitespace-nowrap z-50">
        Role: {{ role }}
      </div>
    </div>
  </div>
</header>
