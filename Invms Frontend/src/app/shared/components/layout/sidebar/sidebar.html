<div class="flex h-full flex-col p-4 shadow-sm">
  <div class="mb-8 flex items-center justify-center pt-2">
    <h1 class="text-2xl font-black text-blue-600 tracking-wider">InvMS<span class="text-slate-800">.pro</span></h1>
  </div>
  
  <!-- User Profile Section -->
  <div class="mb-4 flex items-center gap-3 p-3 bg-slate-50 rounded-xl relative group">
    <div class="h-10 w-10 flex-shrink-0 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
      {{ username.charAt(0).toUpperCase() }}
    </div>
    <div class="min-w-0">
      <p class="text-sm font-bold text-slate-900 truncate">{{ username }}</p>
      <p class="text-xs text-slate-500 capitalize cursor-help">{{ role }}</p>
    </div>
    
    <!-- Role Tooltip -->
    <div class="absolute left-full ml-4 invisible group-hover:visible bg-slate-800 text-white text-[10px] py-1 px-2 rounded shadow-lg whitespace-nowrap z-50">
      Role: {{ role }}
    </div>
  </div>

  <nav class="flex-1 space-y-2">
    <!-- Links (Keep existing) -->
    <a routerLink="/dashboard" routerLinkActive="bg-blue-50 text-blue-700" class="flex items-center gap-3 rounded-lg px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
      <span class="font-medium">Dashboard</span>
    </a>
    
    <a routerLink="/products" routerLinkActive="bg-blue-50 text-blue-700" class="flex items-center gap-3 rounded-lg px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
      <span class="font-medium">Products</span>
    </a>
  </nav>

  <!-- Bottom action -->
  <div class="mt-auto border-t border-slate-100 pt-4">
    <button (click)="onLogout()" class="flex w-full items-center gap-3 rounded-lg px-4 py-3 text-red-600 hover:bg-red-50 transition-colors group">
      <svg class="h-5 w-5 text-red-400 group-hover:text-red-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
      <span class="font-medium">Sign Out</span>
    </button>
  </div>
</div>
