<div
  class="flex h-16 w-full items-center justify-between bg-white/80 px-4 md:px-6 backdrop-blur-md border-b border-slate-100 shadow-sm sticky top-0 z-40">

  <!-- Toggle & Title -->
  <div class="flex items-center gap-4">
    <button (click)="toggleSidebar()"
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all active:scale-95 border border-slate-100">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <div class="flex items-center gap-2">
      <div class="h-8 w-8 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <span class="text-sm font-black text-slate-800 tracking-tight hidden sm:block">System Terminal</span>
    </div>
  </div>

  <!-- Actions & Profile -->
  <div class="flex items-center gap-3 md:gap-6">

    <!-- Notifications (Ghost) -->
    <button
      class="relative rounded-full p-2 text-slate-400 transition-colors hover:bg-slate-50 hover:text-slate-600 hidden sm:block">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span class="absolute top-2 right-2 flex h-2 w-2 rounded-full bg-blue-500 ring-2 ring-white"></span>
    </button>

    <!-- User Profile Dropdown -->
    <div class="relative">
      <button (click)="toggleMenu()"
        class="flex items-center gap-2 md:gap-3 rounded-2xl border border-slate-200 bg-white p-1 md:p-1.5 transition-all hover:border-blue-200 hover:shadow-md active:scale-95 group">
        <div
          class="h-7 w-7 md:h-8 md:w-8 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white font-black text-xs shadow-inner">
          {{ username.charAt(0).toUpperCase() }}
        </div>
        <div class="hidden text-left md:block pr-2">
          <p class="text-[11px] font-black text-slate-900 leading-tight">{{ username }}</p>
          <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">{{ role }}</p>
        </div>
        <svg class="h-4 w-4 mr-1 text-slate-400 transition-transform duration-200" [class.rotate-180]="showMenu"
          fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- User Dropdown Menu -->
      <div *ngIf="showMenu"
        class="absolute right-0 mt-3 w-56 origin-top-right rounded-2xl border border-slate-100 bg-white/95 p-2 shadow-2xl backdrop-blur-xl ring-1 ring-black/5 animate-in fade-in zoom-in duration-200 block z-[60]">
        <div class="px-3 py-3 border-b border-slate-50 mb-1">
          <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Signed in as</p>
          <p class="text-sm font-bold text-slate-800 truncate">{{ username }}</p>
        </div>

        <button routerLink="/users/change-password" (click)="showMenu = false"
          class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-blue-50 hover:text-blue-700 transition-all group">
          <svg class="h-4 w-4 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
          Change Password
        </button>

        <div class="my-1 border-t border-slate-50"></div>

        <button (click)="onLogout()"
          class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 transition-all group">
          <svg class="h-4 w-4 text-red-400 group-hover:text-red-500 transition-colors" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>
</div>
