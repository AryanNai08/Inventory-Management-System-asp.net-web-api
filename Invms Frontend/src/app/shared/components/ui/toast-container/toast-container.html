<div class="fixed top-5 right-5 toast-container-wrapper flex flex-col gap-3 pointer-events-none w-full max-w-sm">
  <div *ngFor="let toast of toasts" 
       class="pointer-events-auto toast-item flex items-start p-4 rounded-xl shadow-2xl border bg-white ring-1 ring-black ring-opacity-5 transition-all duration-300"
       [ngClass]="{
         'border-green-100': toast.type === 'success',
         'border-red-100': toast.type === 'error',
         'border-blue-100': toast.type === 'info'
       }">
    
    <!-- Icon -->
    <div class="flex-shrink-0 mr-3">
      <svg *ngIf="toast.type === 'success'" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      <svg *ngIf="toast.type === 'error'" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      <svg *ngIf="toast.type === 'info'" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0">
      <h4 class="text-sm font-bold text-slate-900 leading-tight">{{ toast.title }}</h4>
      <p class="mt-1 text-xs text-slate-600 break-words">{{ toast.message }}</p>
    </div>

    <!-- Close Button -->
    <button (click)="remove(toast)" class="ml-4 flex-shrink-0 text-slate-400 hover:text-slate-600 transition-colors">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>
  </div>
</div>
