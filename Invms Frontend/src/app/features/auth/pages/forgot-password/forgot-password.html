<div class="flex min-h-screen items-center justify-center bg-slate-50 p-6 lg:p-10">
  <div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="mb-10 text-center">
      <h1 class="text-3xl font-black text-blue-600 tracking-wider">InvMS<span class="text-slate-800">.pro</span></h1>
      <p class="mt-2 text-sm font-medium text-slate-500 italic">Inventory Intelligence Simplified.</p>
    </div>

    <!-- Main Card -->
    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-2xl shadow-slate-200/50">
      <div class="p-8 lg:p-10">
        <h2 class="text-2xl font-black text-slate-900">Forgot Password?</h2>
        <p class="mt-2 text-sm text-slate-500">Enter your email and we'll send you an OTP to reset your password.</p>

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
          <div>
            <label for="email" class="block text-sm font-bold text-slate-700">Email Address</label>
            <div class="mt-2">
              <input formControlName="email" id="email" type="email" placeholder="john@example.com"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4"
                [class.border-red-300]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
            </div>
            <p *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid" class="mt-2 text-xs font-medium text-red-500">Please enter a valid email.</p>
          </div>

          <button type="submit" [disabled]="isLoading || forgotForm.invalid"
            class="group relative flex w-full items-center justify-center gap-3 overflow-hidden rounded-xl bg-blue-600 px-6 py-4 text-sm font-black text-white transition-all hover:bg-blue-700 active:scale-95 disabled:opacity-70 disabled:active:scale-100 shadow-lg shadow-blue-500/30">
            <span *ngIf="!isLoading">Send Reset OTP</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="h-4 w-4 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Requesting...
            </span>
          </button>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-100 text-center">
          <a routerLink="/auth/login" class="text-sm font-bold text-slate-400 hover:text-blue-600 transition-colors flex items-center justify-center gap-2">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            Back to Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
