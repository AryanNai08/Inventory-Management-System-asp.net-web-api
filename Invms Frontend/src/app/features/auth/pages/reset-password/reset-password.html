<div class="flex min-h-screen items-center justify-center bg-slate-50 p-6 lg:p-10">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="mb-10 text-center">
      <h1 class="text-3xl font-black text-blue-600 tracking-wider">InvMS<span class="text-slate-800">.pro</span></h1>
      <p class="mt-2 text-sm font-medium text-slate-500 italic">Secure Password Recovery</p>
    </div>

    <!-- Main Card -->
    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-2xl shadow-slate-200/50">
      <div class="p-8 lg:p-10">
        <h2 class="text-2xl font-black text-slate-900">Reset Password</h2>
        <p class="mt-2 text-sm text-slate-500">We've sent a 6-digit code to <strong>{{ email }}</strong>. Please enter it below to set your new password.</p>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
          <!-- OTP -->
          <div>
            <label for="otp" class="block text-sm font-bold text-slate-700">Verification Code (OTP)</label>
            <div class="mt-2">
              <input formControlName="otp" id="otp" type="text" maxlength="6" placeholder="000000"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-center text-xl font-black tracking-[0.5em] text-blue-600 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
          </div>

          <!-- New Password -->
          <div>
            <label for="newPassword" class="block text-sm font-bold text-slate-700">New Password</label>
            <div class="mt-2">
              <input formControlName="newPassword" id="newPassword" type="password" placeholder="••••••••"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-bold text-slate-700">Confirm Password</label>
            <div class="mt-2">
              <input formControlName="confirmPassword" id="confirmPassword" type="password" placeholder="••••••••"
                class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none ring-blue-500 transition-all focus:border-blue-500 focus:bg-white focus:ring-4">
            </div>
            <p *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched" class="mt-2 text-xs font-medium text-red-500">Passwords do not match.</p>
          </div>

          <button type="submit" [disabled]="isLoading || resetForm.invalid"
            class="group relative flex w-full items-center justify-center gap-3 overflow-hidden rounded-xl bg-blue-600 px-6 py-4 text-sm font-black text-white transition-all hover:bg-blue-700 active:scale-95 disabled:opacity-70 disabled:active:scale-100 shadow-lg shadow-blue-500/30">
            <span *ngIf="!isLoading">Update Password</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="h-4 w-4 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Updating...
            </span>
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-xs text-slate-400">Didn't get the code? <a routerLink="/auth/forgot-password" class="font-bold text-blue-500 hover:underline">Resend Request</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
